version: "3.9"

services:
  # ── MongoDB ─────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: ftp-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: farm-to-plate
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Node.js / Express) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ftp-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT:                   5000
      MONGO_URI:              mongodb://mongo:27017/farm-to-plate
      JWT_SECRET:             ${JWT_SECRET:-supersecretchangeme}
      JWT_EXPIRES_IN:         7d
      CLOUDINARY_CLOUD_NAME:  ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY:     ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET:  ${CLOUDINARY_API_SECRET}
      CLIENT_URL:             http://localhost:3000
      ML_SERVICE_URL:         http://ml:8000
      NODE_ENV:               production
    volumes:
      - ./backend:/app
      - /app/node_modules

  # ── ML Microservice (Python / FastAPI) ──────────────────────────
  ml:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: ftp-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENV:        production
      PORT:       8000

  # ── Frontend (React / Vite) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ftp-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000

volumes:
  mongo_data:
